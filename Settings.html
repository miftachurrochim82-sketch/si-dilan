<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengaturan - SI DILAN</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
body { background: linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 100%); font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; }
.glass-card { background: rgba(255,255,255,0.75); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 8px 32px rgba(0,0,0,0.05); }
.sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: 260px; background: linear-gradient(180deg, #1e3a8a, #1e40af); color: white; z-index: 40; transition: transform 0.3s; box-shadow: 4px 0 20px rgba(0,0,0,0.2); }
.sidebar.collapsed { transform: translateX(-100%); }
.sidebar-header { padding: 24px 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.sidebar-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; font-size: 14px; font-weight: 500; color: white; text-decoration: none; transition: background 0.2s; }
.sidebar-item:hover { background: rgba(255,255,255,0.1); }
.sidebar-item.active { background: rgba(255,255,255,0.2); }
.main-content { margin-left: 260px; padding: 24px; min-height: 100vh; transition: margin-left 0.3s; }
.main-content.expanded { margin-left: 0; }
.btn-primary { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; }
@media (max-width: 768px) {
.sidebar { width: 280px; transform: translateX(-100%); }
.sidebar.open { transform: translateX(0); }
.main-content { margin-left: 0; }
.main-content.shifted { margin-left: 280px; }
}
</style>
</head>
<body>

<div id="app">
<!-- SIDEBAR -->
<aside class="sidebar" :class="{ collapsed: !sidebarOpen && !isMobile, open: sidebarOpen && isMobile }">
<div class="sidebar-header">
<div class="flex items-center justify-between mb-4">
<div class="flex items-center gap-2"><i class="bi bi-shield-shaded text-2xl"></i><span class="font-bold text-lg">SI DILAN</span></div>
<button @click="sidebarOpen=!sidebarOpen" class="text-white/70 hover:text-white"><i :class="sidebarOpen?'bi bi-chevron-left':'bi bi-chevron-right'" class="text-xl"></i></button>
</div>
<p class="text-xs text-blue-200">Satpol PPK Trenggalek</p>
</div>
<nav class="p-4 space-y-1">
<a href="index.html" class="sidebar-item"><i class="bi bi-speedometer2"></i> Dashboard</a>
<a href="form.html?tab=pengaduan" class="sidebar-item"><i class="bi bi-megaphone"></i> Pengaduan</a>
<a href="form.html?tab=st" class="sidebar-item"><i class="bi bi-envelope-paper"></i> Surat Tugas</a>
<a href="master.html" class="sidebar-item"><i class="bi bi-server"></i> Master Data</a>
<a href="settings.html" class="sidebar-item active"><i class="bi bi-gear"></i> Pengaturan</a>
</nav>
</aside>

<!-- MAIN -->
<main class="main-content" :class="{ expanded: !sidebarOpen && !isMobile, shifted: sidebarOpen && isMobile }">
<div class="max-w-2xl mx-auto">
<div class="flex justify-between items-center mb-6">
<div><h1 class="text-2xl font-bold text-blue-800">Pengaturan</h1><p class="text-sm text-blue-500">Konfigurasi identitas instansi dan kontak</p></div>
<button @click="sidebarOpen=!sidebarOpen" class="lg:hidden btn-primary"><i class="bi bi-list"></i> Menu</button>
</div>

<div class="glass-card rounded-2xl p-6 space-y-4">
<div v-for="item in settingsList" :key="item.key" class="space-y-1">
<label class="text-xs font-bold text-gray-600">{{ item.label }}</label>
<input v-model="item.value" class="w-full border rounded-lg px-3 py-2 text-sm">
</div>

<div class="flex justify-end gap-2 pt-4">
<button @click="loadSettings" class="bg-gray-200 px-4 py-2 rounded-lg text-sm font-bold">Muat Ulang</button>
<button @click="saveSettings" class="btn-primary">Simpan Pengaturan</button>
</div>
<p v-if="message" class="text-sm text-center" :class="messageColor">{{ message }}</p>
</div>
</div>
</main>
</div>

<script>
const supa = window.supabase.createClient('https://msdacugqzxprxajdudsx.supabase.co', 'sb_publishable_yt8MhUQzKsaK-c_k4bOtTQ_TMXSOTEf');

Vue.createApp({
data() {
return {
settingsList: [
{ key: 'SETTING_NAMA_KABUPATEN', label: 'Nama Kabupaten', value: '' },
{ key: 'SETTING_NAMA_SATUAN', label: 'Nama Satuan', value: '' },
{ key: 'SETTING_ALAMAT', label: 'Alamat', value: '' },
{ key: 'SETTING_WA_SATPOL', label: 'WhatsApp Satpol PP', value: '' },
{ key: 'SETTING_WA_DAMKAR', label: 'WhatsApp Damkar', value: '' },
{ key: 'SETTING_IG', label: 'Instagram', value: '' },
{ key: 'SETTING_FB', label: 'Facebook', value: '' }
],
sidebarOpen: true,
isMobile: window.innerWidth < 768,
message: '',
messageColor: 'text-green-600'
}
},
methods: {
async loadSettings() {
const { data } = await supa.from('settings').select('*');
if (data) {
data.forEach(s => {
const item = this.settingsList.find(i => i.key === s.key);
if (item) item.value = s.value || '';
});
}
},
async saveSettings() {
try {
for (const item of this.settingsList) {
// Cek apakah sudah ada, kalau ada update, kalau tidak insert
const { data: existing } = await supa.from('settings').select('*').eq('key', item.key).maybeSingle();
if (existing) {
await supa.from('settings').update({ value: item.value }).eq('key', item.key);
} else {
await supa.from('settings').insert({ key: item.key, value: item.value });
}
}
this.message = '✅ Pengaturan berhasil disimpan!';
this.messageColor = 'text-green-600';
} catch (e) {
this.message = '❌ Gagal menyimpan: ' + e.message;
this.messageColor = 'text-red-500';
}
}
},
mounted() {
if (this.isMobile) this.sidebarOpen = false;
window.addEventListener('resize', () => {
this.isMobile = window.innerWidth < 768;
if (!this.isMobile) this.sidebarOpen = true;
});
this.loadSettings();
}
}).mount('#app');
</script>
</body>
</html>
