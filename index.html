<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>SI DILAN Terpadu</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text x='0' y='14' font-size='14'>📋</text></svg>">
  <style>
    .stat-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .stat-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.1); }
    #app-loading { position: fixed; inset: 0; z-index: 9999; background: linear-gradient(135deg, #0f172a, #1e3a8a); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; transition: opacity 0.7s ease; }
    #app-loading.hide { opacity: 0; pointer-events: none; }
    .tab-btn { padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
    .tab-btn.active { background: #2563eb; color: white; }
    .tab-btn:not(.active) { background: #e2e8f0; color: #475569; }
    .dark .tab-btn:not(.active) { background: #334155; color: #94a3b8; }
    .map-container { height: 450px; border-radius: 16px; overflow: hidden; }
    .legend { background: white; padding: 8px 12px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); font-size: 12px; line-height: 1.6; }
    .dark .legend { background: #1e293b; color: #e2e8f0; }
    .legend i { width: 14px; height: 14px; display: inline-block; border-radius: 50%; margin-right: 6px; }
  </style>
</head>
<body>
<div id="app-loading">
  <div style="font-size: 28px; font-weight: 700; letter-spacing: 2px;">SI DILAN TERPADU</div>
  <div style="font-size: 12px; margin-top: 12px; opacity: 0.8;">Menyambungkan...</div>
  <div style="margin-top: 20px; width: 180px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden;">
    <div style="width: 60%; height: 100%; background: #fbbf24; border-radius: 2px; animation: loading 1.5s infinite;"></div>
  </div>
</div>

<div id="app" v-cloak>
  <!-- Login -->
  <div v-if="!session" class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-slate-900 to-blue-900">
    <div class="glass-card rounded-3xl p-8 w-full max-w-md shadow-2xl">
      <div class="text-center mb-8">
        <i class="bi bi-shield-shaded text-5xl text-blue-600 dark:text-blue-300 block mb-2"></i>
        <h2 class="text-2xl font-extrabold text-slate-800 dark:text-white">SI DILAN</h2>
        <p class="text-sm text-slate-500 dark:text-slate-400">Sistem Informasi Digital Melayani</p>
      </div>
      <form @submit.prevent="handleLogin" class="space-y-4">
        <div><label class="text-xs font-bold text-slate-600 dark:text-slate-300 block mb-1">Email</label><input type="email" v-model="loginEmail" required placeholder="admin@trenggalek.go.id" class="w-full border border-slate-300 dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded-lg px-4 py-2.5 text-sm"></div>
        <div><label class="text-xs font-bold text-slate-600 dark:text-slate-300 block mb-1">Password</label><input type="password" v-model="loginPassword" required placeholder="••••••••" class="w-full border border-slate-300 dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded-lg px-4 py-2.5 text-sm"></div>
        <div v-if="loginError" class="text-red-500 text-xs bg-red-50 dark:bg-red-900/20 p-2 rounded">{{ loginError }}</div>
        <button type="submit" class="btn-primary w-full py-3" :disabled="loginLoading"><span v-if="loginLoading"><i class="bi bi-hourglass-split animate-spin"></i> Masuk...</span><span v-else><i class="bi bi-box-arrow-in-right"></i> Masuk</span></button>
      </form>
      <p class="text-center text-[10px] text-slate-400 mt-6">Satpol PP & Kebakaran Kab. Trenggalek</p>
    </div>
  </div>

  <!-- Main App -->
  <div v-else>
    <div class="mobile-overlay" :class="{ show: sidebarOpen && isMobile }" @click="sidebarOpen = false"></div>
    <app-sidebar :current-page="currentPage" :sidebar-open="sidebarOpen" :is-mobile="isMobile" :dark-mode="isDark"
      @toggle-sidebar="sidebarOpen=!sidebarOpen" @toggle-dark="toggleDarkMode" @navigate="currentPage=$event"></app-sidebar>
    <toast-container ref="toastContainer"></toast-container>
    <loading-overlay :visible="loadingVisible" :message="loadingMessage"></loading-overlay>

    <main class="main-content" :class="{ expanded: !sidebarOpen && !isMobile, shifted: sidebarOpen && isMobile }">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h1 class="text-2xl font-extrabold" style="color: var(--text)">{{ pageTitle }}</h1>
          <p class="text-sm" style="color: var(--text2)">{{ pageSubtitle }}</p>
        </div>
        <div class="flex items-center gap-2">
          <button @click="sidebarOpen=!sidebarOpen" class="lg:hidden btn-primary"><i class="bi bi-list"></i> Menu</button>
          <button @click="handleLogout" class="text-sm bg-red-500 hover:bg-red-600 text-white px-3 py-1.5 rounded-lg"><i class="bi bi-box-arrow-right"></i></button>
        </div>
      </div>
      <component :is="currentComponent" :key="currentPage"></component>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="assets/js/app.js"></script>
</body>
</html>
