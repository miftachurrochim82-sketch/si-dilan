<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Laporan Kegiatan - SI DILAN</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div id="app" v-cloak>
  <div class="mobile-overlay" :class="{ show: sidebarOpen && isMobile }" @click="sidebarOpen=false"></div>
  <app-sidebar :sidebar-open="sidebarOpen" :is-mobile="isMobile" current-page="laporan" :dark-mode="isDark" @toggle-sidebar="sidebarOpen=!sidebarOpen" @toggle-dark="toggleDarkMode"></app-sidebar>
  <toast-container ref="toastContainer"></toast-container>
  <loading-overlay ref="loadingOverlay"></loading-overlay>

  <main class="main-content" :class="{ expanded: !sidebarOpen && !isMobile, shifted: sidebarOpen && isMobile }">
    <div class="max-w-4xl mx-auto">
      <div class="flex justify-between items-center mb-6"><div><h1 class="text-2xl font-bold" style="color:var(--text)">Laporan Kegiatan</h1><p class="text-sm" style="color:var(--text2)">Buat laporan hasil kegiatan</p></div><button @click="sidebarOpen=!sidebarOpen" class="lg:hidden btn-primary"><i class="bi bi-list"></i> Menu</button></div>

      <div class="space-y-6">
        <!-- I. Pilih ST -->
        <div class="glass-card rounded-2xl border border-purple-100 overflow-hidden">
          <div class="bg-gradient-to-r from-purple-50 to-indigo-50/30 dark:from-purple-900/20 dark:to-indigo-900/20 border-b border-purple-200 px-5 py-3"><h3 class="font-bold text-sm text-purple-700 dark:text-purple-300">I. Pilih Surat Tugas</h3></div>
          <div class="p-4"><select v-model="laporan.surat_tugas_id" class="w-full border rounded-lg px-3 py-2.5 text-sm bg-white dark:bg-gray-700 dark:text-white"><option value="" disabled>-- Pilih Surat Tugas --</option><option v-for="st in stAktifList" :value="st.id">{{ st.nomor_st || st.kegiatan }}</option></select></div>
        </div>
        <!-- II. Waktu -->
        <div class="glass-card rounded-2xl border border-blue-100 overflow-hidden">
          <div class="bg-gradient-to-r from-blue-50 to-indigo-50/30 dark:from-blue-900/20 dark:to-indigo-900/20 border-b border-blue-200 px-5 py-3"><h3 class="font-bold text-sm text-blue-700 dark:text-blue-300">II. Waktu & Kehadiran</h3></div>
          <div class="p-4 space-y-3">
            <div><label class="text-xs font-bold text-slate-600 dark:text-slate-300">Jam Selesai</label><input type="time" v-model="laporan.jam_selesai" class="w-full border rounded-lg px-3 py-2.5 text-sm mt-1 bg-white dark:bg-gray-700 dark:text-white"></div>
            <div><label class="text-xs font-bold text-slate-600 dark:text-slate-300">Yang Hadir</label><input v-model="laporan.hadir" placeholder="Nama pejabat/tamu..." class="w-full border rounded-lg px-3 py-2.5 text-sm mt-1 bg-white dark:bg-gray-700 dark:text-white"></div>
            <div><label class="text-xs font-bold text-slate-600 dark:text-slate-300">Tanggal Laporan</label><input type="date" v-model="laporan.tanggal_laporan" required class="w-full border rounded-lg px-3 py-2.5 text-sm mt-1 bg-white dark:bg-gray-700 dark:text-white"></div>
          </div>
        </div>
        <!-- III. Dokumentasi -->
        <div class="glass-card rounded-2xl border border-pink-100 overflow-hidden">
          <div class="bg-gradient-to-r from-pink-50 to-rose-50/30 dark:from-pink-900/20 dark:to-rose-900/20 border-b border-pink-200 px-5 py-3"><h3 class="font-bold text-sm text-pink-700 dark:text-pink-300">III. Dokumentasi (maks. 6 foto)</h3></div>
          <div class="p-4 space-y-3">
            <div class="flex items-center gap-2 flex-wrap">
              <label class="bg-pink-500 hover:bg-pink-600 text-white text-xs font-semibold px-3 py-2.5 rounded-lg cursor-pointer"><i class="bi bi-images"></i> Pilih Foto<input type="file" @change="onFileChange" accept="image/*" multiple class="hidden"></label>
              <button @click="cetakKolase" :disabled="!previewGambar.length" class="bg-rose-500 hover:bg-rose-600 disabled:bg-slate-300 text-white text-xs font-semibold px-3 py-2.5 rounded-lg"><i class="bi bi-printer"></i> Cetak Kolase</button>
              <button @click="unduhKolase" :disabled="!previewGambar.length" class="bg-teal-500 hover:bg-teal-600 disabled:bg-slate-300 text-white text-xs font-semibold px-3 py-2.5 rounded-lg"><i class="bi bi-download"></i> Unduh Kolase</button>
            </div>
            <div v-if="previewGambar.length" class="grid grid-cols-3 gap-2">
              <div v-for="(img,i) in previewGambar" :key="i" class="relative aspect-square rounded-lg overflow-hidden border-2 border-slate-200 dark:border-gray-600"><img :src="img.data" class="w-full h-full object-cover"><button @click="hapusGambar(i)" class="absolute top-1 right-1 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs">✕</button></div>
            </div>
          </div>
        </div>
        <!-- IV. Uraian -->
        <div class="glass-card rounded-2xl border border-emerald-100 overflow-hidden">
          <div class="bg-gradient-to-r from-emerald-50 to-teal-50/30 dark:from-emerald-900/20 dark:to-teal-900/20 border-b border-emerald-200 px-5 py-3"><h3 class="font-bold text-sm text-emerald-700 dark:text-emerald-300">IV. Uraian Pelaksanaan</h3></div>
          <div class="p-4"><textarea v-model="laporan.uraian_pelaksanaan" rows="10" required class="w-full border rounded-lg p-2.5 text-sm bg-white dark:bg-gray-700 dark:text-white" placeholder="Tulis uraian pelaksanaan..."></textarea></div>
        </div>
        <!-- V. Temuan -->
        <div class="glass-card rounded-2xl border border-amber-100 overflow-hidden">
          <div class="bg-gradient-to-r from-amber-50 to-orange-50/30 dark:from-amber-900/20 dark:to-orange-900/20 border-b border-amber-200 px-5 py-3"><h3 class="font-bold text-sm text-amber-700 dark:text-amber-300">V. Temuan</h3></div>
          <div class="p-4"><textarea v-model="laporan.temuan" rows="5" class="w-full border rounded-lg p-2.5 text-sm bg-white dark:bg-gray-700 dark:text-white" placeholder="Tulis temuan..."></textarea></div>
        </div>
        <!-- VI & VII -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="glass-card rounded-2xl border border-indigo-100 overflow-hidden"><div class="bg-gradient-to-r from-indigo-50 to-blue-50/30 dark:from-indigo-900/20 dark:to-blue-900/20 border-b border-indigo-200 px-5 py-3"><h3 class="font-bold text-sm text-indigo-700 dark:text-indigo-300">VI. Tindakan</h3></div><div class="p-4"><textarea v-model="laporan.tindakan" rows="5" class="w-full border rounded-lg p-2.5 text-sm bg-white dark:bg-gray-700 dark:text-white" placeholder="Tulis tindakan..."></textarea></div></div>
          <div class="glass-card rounded-2xl border border-cyan-100 overflow-hidden"><div class="bg-gradient-to-r from-cyan-50 to-blue-50/30 dark:from-cyan-900/20 dark:to-blue-900/20 border-b border-cyan-200 px-5 py-3"><h3 class="font-bold text-sm text-cyan-700 dark:text-cyan-300">VII. Hasil</h3></div><div class="p-4"><textarea v-model="laporan.hasil" rows="5" class="w-full border rounded-lg p-2.5 text-sm bg-white dark:bg-gray-700 dark:text-white" placeholder="Terkendali / Selesai"></textarea></div></div>
        </div>
        <div class="flex justify-end gap-2">
          <button @click="resetForm()" class="bg-slate-100 hover:bg-slate-200 dark:bg-gray-600 dark:text-white text-xs font-bold px-4 py-2.5 rounded-lg"><i class="bi bi-arrow-counterclockwise"></i> Reset</button>
          <button @click="simpanLaporan" :disabled="loading" class="bg-purple-500 hover:bg-purple-600 disabled:bg-slate-300 text-white text-xs font-bold px-6 py-2.5 rounded-lg"><i :class="loading?'bi bi-hourglass-split animate-spin':'bi bi-save'"></i> {{ loading?'Menyimpan...':'Simpan Laporan' }}</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/utils.js"></script>
<script src="components/sidebar.js"></script>
<script src="components/toast.js"></script>
<script src="components/loading.js"></script>

<script>
const { createApp } = Vue;
createApp({
  data() {
    return {
      sidebarOpen: true, isMobile: window.innerWidth < 768,
      isDark: localStorage.getItem('darkMode')==='true',
      laporan: { surat_tugas_id:'', jam_selesai:'', hadir:'', tanggal_laporan: new Date().toISOString().split('T')[0], uraian_pelaksanaan:'', temuan:'', tindakan:'', hasil:'Terkendali / Selesai', gambar:[] },
      previewGambar: [], suratTugasList:[], laporanList:[], loading:false
    }
  },
  computed: {
    stAktifList() { return this.suratTugasList.filter(s=>s.status==='Aktif') }
  },
  methods: {
    addToast(m,t='success'){ this.$refs.toastContainer?.addToast(m,t) },
    toggleDarkMode(){ this.isDark=!this.isDark; localStorage.setItem('darkMode',this.isDark); document.documentElement.classList.toggle('dark',this.isDark) },
    async loadMaster(){ try{ const {data}=await window.supabase.from('surat_tugas').select('*').order('created_at',{ascending:false}); this.suratTugasList=data||[] }catch(e){ this.addToast('Gagal load ST','error') } },
    async loadLaporan(){ try{ const {data}=await window.supabase.from('laporan').select('*').order('tanggal_laporan',{ascending:false}); this.laporanList=data||[] }catch(e){ this.addToast('Gagal load laporan','error') } },
    onFileChange(e){
      const files=e.target.files; if(!files||!files.length) return;
      for(let i=0;i<files.length&&this.laporan.gambar.length<6;i++){ const f=files[i]; if(!f.type.startsWith('image/')){this.addToast('Hanya gambar','error');continue} if(f.size>5*1024*1024){this.addToast('Maks 5MB','error');continue} const reader=new FileReader(); reader.onload=ev=>{this.laporan.gambar.push(ev.target.result);this.previewGambar.push({data:ev.target.result,name:f.name})}; reader.readAsDataURL(f) }
      e.target.value=''
    },
    hapusGambar(i){ this.laporan.gambar.splice(i,1); this.previewGambar.splice(i,1) },
    resetForm(){ this.laporan={ surat_tugas_id:'', jam_selesai:'', hadir:'', tanggal_laporan:new Date().toISOString().split('T')[0], uraian_pelaksanaan:'', temuan:'', tindakan:'', hasil:'Terkendali / Selesai', gambar:[] }; this.previewGambar=[] },
    async cetakKolase(){
      if(!this.previewGambar.length){ this.addToast('Tidak ada gambar','error'); return }
      const container=document.createElement('div'); container.style.display='flex'; container.style.flexWrap='wrap'; container.style.gap='8px'; container.style.padding='20px'; container.style.background='white'; container.style.width='800px';
      this.previewGambar.forEach(img=>{ const el=document.createElement('img'); el.src=img.data; el.style.width='calc(33.33% - 8px)'; container.appendChild(el) });
      document.body.appendChild(container);
      try{ const canvas=await html2canvas(container,{scale:2}); const imgData=canvas.toDataURL('image/png'); const w=window.open('','_blank'); w.document.write(`<html><head><title>Kolase</title></head><body style="margin:0;display:flex;justify-content:center"><img src="${imgData}" style="max-width:100%"></body></html>`); w.document.close(); setTimeout(()=>w.print(),500); this.addToast('Kolase siap dicetak') }
      catch(e){ this.addToast('Gagal cetak','error') }
      finally { document.body.removeChild(container) }
    },
    async unduhKolase(){
      if(!this.previewGambar.length) return;
      const container=document.createElement('div'); container.style.display='flex'; container.style.flexWrap='wrap'; container.style.gap='8px'; container.style.padding='20px'; container.style.background='white'; container.style.width='800px';
      this.previewGambar.forEach(img=>{ const el=document.createElement('img'); el.src=img.data; el.style.width='calc(33.33% - 8px)'; container.appendChild(el) });
      document.body.appendChild(container);
      try{ const canvas=await html2canvas(container,{scale:2}); const a=document.createElement('a'); a.download=`kolase_${new Date().toISOString().slice(0,10)}.png`; a.href=canvas.toDataURL('image/png'); a.click(); this.addToast('Kolase terunduh') }
      catch(e){ this.addToast('Gagal unduh','error') }
      finally { document.body.removeChild(container) }
    },
    async simpanLaporan(){
      if(!this.laporan.surat_tugas_id||!this.laporan.uraian_pelaksanaan){ this.addToast('Pilih ST dan isi Uraian','error'); return }
      this.loading=true; this.$loading.show('Menyimpan...');
      try{
        const {error}=await window.supabase.from('laporan').insert({ surat_tugas_id:this.laporan.surat_tugas_id, tanggal_laporan:this.laporan.tanggal_laporan, jam_selesai:this.laporan.jam_selesai||null, hadir:this.laporan.hadir||null, uraian_pelaksanaan:this.laporan.uraian_pelaksanaan, temuan:this.laporan.temuan||null, tindakan:this.laporan.tindakan||null, hasil:this.laporan.hasil, gambar_urls:this.laporan.gambar.length?this.laporan.gambar:null });
        if(error) throw error;
        await window.supabase.from('surat_tugas').update({status:'Selesai Lapor'}).eq('id',this.laporan.surat_tugas_id);
        this.addToast('✅ Laporan tersimpan!'); this.resetForm(); await this.loadMaster(); await this.loadLaporan();
      }catch(e){ this.addToast('Gagal: '+e.message,'error') }
      finally { this.loading=false; this.$loading.hide() }
    }
  },
  mounted(){
    if(this.isDark) document.documentElement.classList.add('dark');
    if(this.isMobile) this.sidebarOpen=false;
    window.addEventListener('resize',()=>{ this.isMobile=window.innerWidth<768; if(!this.isMobile) this.sidebarOpen=true });
    this.loadMaster(); this.loadLaporan();
    console.log('🚀 form_laporan ready');
  }
}).mount('#app');
</script>
</body>
</html>
